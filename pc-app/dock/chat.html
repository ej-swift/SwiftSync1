<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>SwiftSync Chat — OBS Dock</title>

  <link rel="stylesheet" href="/shared/swiftsync-ui.css?v=27">

  <style>

    html, body {

      margin: 0;

      height: 100%;

      background: #0a0a0a;

      overflow: hidden;

      font-size: var(--dock-font, 12px);

    }

    body.dock-compact { --dock-font: 11px; }

    body.dock-large { --dock-font: 14px; }

    .dock-chat-shell {

      display: flex;

      flex-direction: column;

      height: 100vh;

      font-family: var(--font-ui, system-ui, sans-serif);

      color: #e8e8e8;

    }

    .dock-chat-header {

      flex-shrink: 0;

      padding: 8px 10px;

      border-bottom: 1px solid #222;

      background: linear-gradient(180deg, #141414 0%, #0d0d0d 100%);

    }

    .dock-chat-header h1 {

      margin: 0;

      font-size: calc(var(--dock-font) + 1px);

      font-weight: 700;

    }

    .dock-chat-header p {

      margin: 4px 0 0;

      font-size: calc(var(--dock-font) - 1px);

      color: #888;

    }

    .dock-toolbar {

      display: flex;

      gap: 6px;

      margin-top: 6px;

      flex-wrap: wrap;

    }

    .dock-toolbar button {

      padding: 3px 8px;

      border-radius: 4px;

      border: 1px solid #333;

      background: #1a1a1a;

      color: #aaa;

      font-size: calc(var(--dock-font) - 2px);

      cursor: pointer;

    }

    .dock-toolbar button.active { border-color: #00ff85; color: #00ff85; }

    .dock-chat-messages {

      flex: 1;

      overflow-y: auto;

      padding: 8px;

      font-size: var(--dock-font);

      line-height: 1.4;

    }

    .dock-compact .dock-chat-messages { padding: 4px 6px; }

    .dock-chat-compose {

      flex-shrink: 0;

      display: flex;

      gap: 6px;

      padding: 8px;

      border-top: 1px solid #222;

      background: #111;

    }

    .dock-chat-compose input,

    .dock-chat-compose select {

      font-size: var(--dock-font);

      padding: 6px 8px;

      border-radius: 6px;

      border: 1px solid #333;

      background: #1a1a1a;

      color: #eee;

    }

    .dock-chat-compose input { flex: 1; }

    .dock-chat-compose select { max-width: 90px; }

    .dock-chat-compose button {

      padding: 6px 10px;

      border-radius: 6px;

      border: 1px solid #2a4a2a;

      background: #1e2a1e;

      color: #00ff85;

      cursor: pointer;

      font-size: calc(var(--dock-font) - 1px);

    }

    .dock-status { color: #f0c14b; }

    .dock-status.ok { color: #00ff85; }

    .dock-status.err { color: #ff6666; }

    .dock-help {

      margin: 6px 0 0;

      font-size: calc(var(--dock-font) - 2px);

      color: #666;

      line-height: 1.35;

    }

    .chat-msg { margin-bottom: 6px; word-break: break-word; }

    .chat-msg .platform {

      font-size: calc(var(--dock-font) - 3px);

      font-weight: 700;

      text-transform: uppercase;

      margin-right: 6px;

      opacity: 0.9;

    }

    .chat-msg .user { color: #7eb8ff; font-weight: 600; }

    .chat-msg.mod .user { color: #00ff85; }

  </style>

</head>

<body class="dock-chat-shell">

  <header class="dock-chat-header">

    <h1>SwiftSync Multichat</h1>

    <p id="dock-status" class="dock-status">Connecting…</p>

    <div class="dock-toolbar" aria-label="Dock display">

      <button type="button" data-font="compact" id="dock-font-compact">Compact</button>

      <button type="button" data-font="normal" id="dock-font-normal" class="active">Normal</button>

      <button type="button" data-font="large" id="dock-font-large">Large</button>

    </div>

    <p class="dock-help" id="dock-help" hidden></p>

  </header>

  <div id="dock-messages" class="dock-chat-messages chat-messages" aria-live="polite"></div>

  <div class="dock-chat-compose">

    <select id="dock-send-platform" aria-label="Platform"></select>

    <input id="dock-send-input" type="text" maxlength="500" placeholder="Send…" disabled>

    <button type="button" id="dock-send-btn" disabled>Send</button>

  </div>

  <script src="chat.js"></script>

</body>

</html>
