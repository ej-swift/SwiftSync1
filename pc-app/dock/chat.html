<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SwiftSync Chat — OBS Dock</title>
  <link rel="stylesheet" href="/shared/swiftsync-ui.css?v=28">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      font-size: var(--dock-font, 11px);
    }

    body.dock-compact { --dock-font: 10px; --dock-indent: 2.4em; }
    body.dock-large { --dock-font: 13px; --dock-indent: 3em; }
    body { --dock-indent: 2.6em; }

    body.dock-chat-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      font-family: var(--font-ui, system-ui, sans-serif);
      color: #e8e8e8;
      text-align: left;
    }

    .dock-chat-header {
      flex: 0 0 auto;
      padding: 5px 7px;
      border-bottom: 1px solid #222;
      background: linear-gradient(180deg, #141414 0%, #0d0d0d 100%);
    }

    .dock-chat-header h1 {
      margin: 0;
      font-size: calc(var(--dock-font) + 1px);
      font-weight: 700;
      line-height: 1.2;
    }

    .dock-status {
      margin: 2px 0 0;
      font-size: calc(var(--dock-font) - 1px);
      color: #f0c14b;
      line-height: 1.2;
    }

    .dock-status.ok { color: #00ff85; }
    .dock-status.err { color: #ff6666; }

    .dock-toolbar {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .dock-toolbar button {
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: calc(var(--dock-font) - 2px);
      cursor: pointer;
      line-height: 1.2;
    }

    .dock-toolbar button.active { border-color: #00ff85; color: #00ff85; }

    .dock-help {
      margin: 4px 0 0;
      font-size: calc(var(--dock-font) - 2px);
      color: #666;
      line-height: 1.3;
    }

    .dock-chat-messages {
      flex: 1 1 auto;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 5px 6px;
      font-size: var(--dock-font);
      line-height: 1.3;
      text-align: left;
      -webkit-overflow-scrolling: touch;
    }

    .dock-compact .dock-chat-messages { padding: 3px 4px; }

    .dock-chat-messages .chat-msg {
      margin-bottom: 5px;
      font-size: var(--dock-font);
    }

    .dock-chat-messages .chat-msg-meta {
      gap: 3px 5px;
    }

    .dock-chat-messages .chat-msg-body {
      padding-left: var(--dock-indent);
      color: #e0e0e0;
      font-size: var(--dock-font);
      line-height: 1.35;
    }

    .dock-chat-messages .chat-platform-badge {
      font-size: calc(var(--dock-font) - 3px);
      padding: 0 5px;
      line-height: 1.3;
    }

    .dock-chat-messages .chat-msg-author {
      font-size: var(--dock-font);
    }

    .dock-chat-compose {
      flex: 0 0 auto;
      display: flex;
      gap: 4px;
      align-items: stretch;
      padding: 5px 6px;
      border-top: 1px solid #222;
      background: #111;
      min-width: 0;
    }

    .dock-chat-compose input,
    .dock-chat-compose select,
    .dock-chat-compose button {
      font-size: var(--dock-font);
      line-height: 1.2;
      min-height: 26px;
    }

    .dock-chat-compose input,
    .dock-chat-compose select {
      padding: 4px 6px;
      border-radius: 5px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #eee;
    }

    .dock-chat-compose input {
      flex: 1 1 auto;
      min-width: 0;
      width: 0;
    }

    .dock-chat-compose select {
      flex: 0 0 auto;
      max-width: 4.5em;
    }

    .dock-chat-compose button {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid #2a4a2a;
      background: #1e2a1e;
      color: #00ff85;
      cursor: pointer;
      white-space: nowrap;
    }

    .dock-compact .dock-chat-compose button { padding: 4px 6px; }
  </style>
</head>
<body class="dock-chat-shell">
  <header class="dock-chat-header">
    <h1>SwiftSync Chat</h1>
    <p id="dock-status" class="dock-status">Connecting…</p>
    <div class="dock-toolbar" aria-label="Dock display">
      <button type="button" data-font="compact" id="dock-font-compact">Compact</button>
      <button type="button" data-font="normal" id="dock-font-normal" class="active">Normal</button>
      <button type="button" data-font="large" id="dock-font-large">Large</button>
    </div>
    <p class="dock-help" id="dock-help" hidden></p>
  </header>

  <div id="dock-messages" class="dock-chat-messages" aria-live="polite"></div>

  <div class="dock-chat-compose">
    <select id="dock-send-platform" aria-label="Platform"></select>
    <input id="dock-send-input" type="text" maxlength="500" placeholder="Send…" disabled>
    <button type="button" id="dock-send-btn" disabled>Send</button>
  </div>

  <script src="/shared/swiftsync-support.js?v=6"></script>
  <script src="chat.js?v=7"></script>
</body>
</html>
